<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>総合コミュニケーション支援ツール</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body>
    <div id="nameEntryOverlay" class="name-entry-overlay">
        <div class="name-entry-card">
            <h2>👋 はじめに</h2>
            <p>会話に参加するための名前を入力してください．．<br><small>（ニックネームでOKです）</small></p>
            <input type="text" id="initialNameInput" placeholder="例：A先生，太郎...">
            <button id="entryBtn">会話を始める</button>
        </div>
    </div>

    <div class="header">
        <button id="mobileMenuBtn" class="mobile-menu-btn action-icon-btn">
            <span class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="currentColor">
                    <path d="M640-80v-90q-56-18-94-64t-44-106h80q8 43 40.5 71.5T700-240h120q25 0 42.5 17.5T880-180v100H640Zm120-200q-33 0-56.5-23.5T680-360q0-33 23.5-56.5T760-440q33 0 56.5 23.5T840-360q0 33-23.5 56.5T760-280ZM360-400q0-150 105-255t255-105v80q-117 0-198.5 81.5T440-400h-80Zm160 0q0-83 58.5-141.5T720-600v80q-50 0-85 35t-35 85h-80ZM80-520v-100q0-25 17.5-42.5T140-680h120q45 0 77.5-28.5T378-780h80q-6 60-44 106t-94 64v90H80Zm120-200q-33 0-56.5-23.5T120-800q0-33 23.5-56.5T200-880q33 0 56.5 23.5T280-800q0 33-23.5 56.5T200-720Z"/>
                </svg>
            </span>
            <span class="text">通信設定</span>
        </button>
        
        <h1>会話ノート</h1>
        <div>
            <button id="settingsBtn" class="settings-link-btn action-icon-btn">
                <span class="icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="currentColor">
                        <path d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-1 13.5l103 78-110 190-119-50q-11 8-23 15t-24 12L590-80H370Zm70-80h80l12-96q21-9 37.5-19.5T599-301l91 38 40-68-79-60q4-14 6-27.5t2-29.5q0-16-2-29.5t-6-27.5l79-60-40-68-91 38q-14-15-30.5-25.5T532-704l-12-96h-80l-12 96q-21 9-37.5 19.5T361-659l-91-38-40 68 79 60q-4 14-6 27.5t-2 29.5q0 16 2 29.5t6 27.5l-79 60 40 68 91-38q14 15 30.5 25.5T428-256l12 96Zm40-220q42 0 71-29t29-71q0-42-29-71t-71-29q-42 0-71 29t-29 71q0 42 29 71t71 29Zm0-100Z"/>
                    </svg>
                </span>
                <span class="text">設定・辞書</span>
            </button>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="drawerOverlay" class="drawer-overlay"></div>
        
        <details class="sync-panel" id="syncPanel">
            <summary class="sync-summary">
                📡 通信・招待機能を開く 
                <span id="syncStatusSummary">（オフライン）</span>
            </summary>
            <div class="sync-content">
                <div class="my-id-area">
                    <div class="label">あなたのID：</div>
                    <div id="myPeerId" class="sync-id">取得中...</div>
                    <div class="btn-group">
                        <button id="copyUrlBtn" class="invite-btn" style="display:none;">🔗 URLコピー</button>
                        <button id="showQrBtn" class="invite-btn" style="display:none;">📱 QRコード表示</button>
                    </div>
                </div>

                <div class="connect-area">
                    <input type="text" id="myNameInput" placeholder="あなたの名前">
                    <input type="text" id="targetPeerId" placeholder="相手のIDを入力">
                    <button id="connectBtn">接続する</button>
                </div>
                
                <div id="syncStatus" class="status-text">現在オフラインです</div>
                
                <div id="qrContainer">
                    <div class="qr-label">相手のカメラで読み取ってください</div>
                    <div id="qrcode"></div>
                </div>
            </div>
        </details>

        <div class="chat-container">
            <div class="chat-header">
                <div class="header-right" style="width: 100%; justify-content: flex-end;">
                    <button id="copyChatBtn" class="action-btn action-icon-btn">
                        <span class="icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="currentColor">
                                <path d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0-33-23.5-56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-560h80v560h440v80H200Zm160-240v-480 480Z"/>
                            </svg>
                        </span>
                        <span class="text">コピー</span>
                    </button>
                    <button id="downloadChatBtn" class="action-btn action-icon-btn">
                        <span class="icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="currentColor">
                                <path d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/>
                            </svg>
                        </span>
                        <span class="text">保存</span>
                    </button>
                    <button id="clearChatBtn" class="clear-btn action-icon-btn">
                        <span class="icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="currentColor">
                                <path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/>
                            </svg>
                        </span>
                        <span class="text">リセット</span>
                    </button>
                </div>
            </div>

            <div id="envSoundCaption" class="caption-bar"></div>
            <div id="typingIndicator" class="typing-indicator"></div>
            <div id="selectionPopup">📖 辞書に登録</div>
            
            <div id="chatLog" class="chat-textarea" data-placeholder="ここに会話の履歴が表示されます..."></div>
            <div id="sttInterim"></div>

            <div class="meter-container">
                <span class="meter-label">🎤 マイク入力：</span>
                <div class="meter-bar-bg"><div id="volumeMeter" class="meter-bar-fill"></div></div>
            </div>

            <div class="input-row">
                <button id="startBtn" class="action-icon-btn" aria-label="聞き取り開始">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </span>
                    <span class="text">聞き取り</span>
                </button>

                <button id="waitBtn" class="wait-btn action-icon-btn" aria-label="待って">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor">
                            <path d="M259-139q-99-99-99-241v-380q0-17 11.5-28.5T200-800q17 0 28.5 11.5T240-760v240h80v-320q0-17 11.5-28.5T360-880q17 0 28.5 11.5T400-840v320h80v-360q0-17 11.5-28.5T520-920q17 0 28.5 11.5T560-880v360h80v-280q0-17 11.5-28.5T680-840q17 0 28.5 11.5T720-800v230q-29 21-44.5 53T660-450v50h-50q-63 0-106.5 43.5T460-250v50h60v-50q0-38 26-64t64-26h110v-110q0-38 26-64t64-26h30v160q0 142-99 241T500-40q-142 0-241-99Z"/>
                        </svg>
                    </span>
                    <span class="text">待って</span>
                </button>

                <textarea id="ttsInput" rows="1" placeholder="返答を入力（Enterで送信）"></textarea>
                
                <button id="speakBtn" class="action-icon-btn" aria-label="送信">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </span>
                    <span class="text">送信</span>
                </button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content settings-container">
            <div class="modal-header">
                <h2>⚙️ 設定・辞書</h2>
                <button id="closeSettingsBtn" class="close-icon-btn">✖</button>
            </div>
            <div id="saveToast">✅ 設定を保存しました</div>

            <div class="section-title">便利機能</div>
            <div class="settings-grid">
                <div class="settings-item">
                    <label>🔔 環境音AI（周囲の音を文字化）</label>
                    <label class="env-toggle" style="display: inline-flex;">
                        <input type="checkbox" id="envSoundToggle"> 環境音の監視をオンにする (注)動作が重くなるかも
                    </label>
                </div>
            </div>
            
            <div class="section-title">文字と音声の調整</div>
            <div class="settings-grid">
                <div class="settings-item">
                    <label>🔠 アプリの文字サイズ</label>
                    <div class="font-controls">
                        <button class="font-btn" id="fontIncreaseBtn">＋ 大きくする</button>
                        <button class="font-btn" id="fontDecreaseBtn">－ 小さくする</button>
                        <span class="font-status">現在のサイズ: <span id="currentFontSizeDisplay">16</span>px</span>
                    </div>
                </div>
                <div class="settings-item">
                    <label>🌙 ダークモード（ナイトモード）</label>
                    <label class="env-toggle" style="display: inline-flex;">
                        <input type="checkbox" id="darkModeToggle"> 暗いテーマを使用する
                    </label>
                </div>
                <div class="settings-item">
                    <label for="voiceSelect">👤 読み上げの声の種類</label>
                    <select id="voiceSelect"></select>
                </div>
                <div class="settings-item">
                    <label for="rateSlider">🏃 読み上げの速度: <span id="rateValue">1.0</span></label>
                    <input type="range" id="rateSlider" min="0.5" max="2" value="1" step="0.1">
                </div>
                <div class="settings-item">
                    <label for="pitchSlider">🎵 読み上げの高さ: <span id="pitchValue">1.0</span></label>
                    <input type="range" id="pitchSlider" min="0" max="2" value="1" step="0.1">
                </div>
            </div>

            <div class="section-title">📖 ユーザー辞書</div>
            <div class="dict-input-row">
                <input type="text" id="dictWrong" placeholder="誤認識される言葉">
                <input type="text" id="dictCorrect" placeholder="正しい言葉">
                <button id="addDictBtn">追加</button>
            </div>
            <ul id="dictList" class="dict-list"></ul>
        </div>
    </div>

    <script src="js/webrtc.js"></script>
    <script src="js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('ServiceWorker 登録成功:', reg.scope))
                    .catch((err) => console.log('ServiceWorker 登録失敗:', err));
            });
        }
    </script>
</body>
</html>
